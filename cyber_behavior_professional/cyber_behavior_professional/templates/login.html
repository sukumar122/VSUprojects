{% extends "base.html" %}

{% block title %}Login - Cyber Profiling{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }
    
    .login-bg-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.15;
        z-index: -1;
    }
    
    .login-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 40px;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .login-icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 15px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .login-icon img {
        width: 60px;
        height: 60px;
        object-fit: contain;
    }
    
    .login-title {
        font-size: 1.8rem;
        font-weight: 600;
        color: white;
        margin-bottom: 5px;
    }
    
    .login-subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.95rem;
    }
    
    .form-label {
        color: rgba(255, 255, 255, 0.8);
        font-weight: 500;
        margin-bottom: 8px;
    }
    
    .input-group-text {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.7);
    }
    
    .btn-login {
        background: linear-gradient(135deg, #00d4ff, #7b2cbf);
        border: none;
        padding: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 10px;
        width: 100%;
        margin-top: 10px;
    }
    
    .btn-login:hover {
        background: linear-gradient(135deg, #00b8e6, #6a1f9f);
        transform: translateY(-2px);
    }
    
    .register-link {
        text-align: center;
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.7);
    }
    
    .register-link a {
        color: #00d4ff;
        font-weight: 600;
        text-decoration: none;
    }
    
    .register-link a:hover {
        text-decoration: underline;
    }
    
    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
        color: rgba(255, 255, 255, 0.5);
    }
    
    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .divider span {
        padding: 0 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1920&q=80" alt="Cybersecurity Background" class="login-bg-image">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/2957/2957551.png" alt="Security Shield">
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to access your cyber profile</p>
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user me-2"></i>Username
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-lock me-2"></i>Password
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        
        <div class="register-link">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-white-50 text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
